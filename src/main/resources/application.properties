spring.application.name=medibook-api-gateway

server.port=${SERVER_PORT}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.routes[2].id=doctor-service
spring.cloud.gateway.routes[2].uri=${DOCTOR_SERVICE_URL}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/doctors/**

spring.cloud.gateway.routes[3].id=appointment-service
spring.cloud.gateway.routes[3].uri=${APPOINTMENT_SERVICE_URL}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/appointments/**

spring.cloud.gateway.routes[4].id=analytics-service
spring.cloud.gateway.routes[4].uri=${ANALYTICS_SERVICE_URL}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/analytics/**